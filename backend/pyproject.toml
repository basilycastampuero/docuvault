[tool.black]
line-length = 88
target-version = ['py313']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = ["migrations", ".venv"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --cov=apps --cov-report=term-missing --cov-report=xml --cov-fail-under=95"
testpaths = ["apps"]
markers = [
    "integration: marks tests as integration tests requiring live infrastructure (MinIO, PostgreSQL, Redis)",
]
